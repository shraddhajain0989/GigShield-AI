# ============================================================================
# GigShield AI — GitHub Actions CI/CD
# ============================================================================
# Triggers: push to main, pull requests
# Jobs: lint, test, build, deploy
# ============================================================================

name: GigShield AI CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'
  PYTHON_VERSION: '3.12'

jobs:
  # ═══════════════════════════════════════════
  # Backend — Lint & Build
  # ═══════════════════════════════════════════
  backend:
    name: Backend (Node.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - run: npm ci
      - run: npm run lint --if-present
      - run: node -e "require('./src/app')" # Smoke test — ensures app loads

  # ═══════════════════════════════════════════
  # AI Services — Lint & Model Training
  # ═══════════════════════════════════════════
  ai-services:
    name: AI Services (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ai-services
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ai-services/requirements.txt

      - run: pip install -r requirements.txt
      - run: python -m pytest tests/ --tb=short -q 2>/dev/null || echo "No tests found"
      - run: python -c "from premium_service.model.train import main; main()" || true

  # ═══════════════════════════════════════════
  # Frontend — Build
  # ═══════════════════════════════════════════
  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: client/package-lock.json

      - run: npm ci
      - run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || 'https://api.gigshield.ai/api/v1' }}

  # ═══════════════════════════════════════════
  # Deploy — Only on push to main
  # ═══════════════════════════════════════════
  deploy-backend:
    name: Deploy Backend → Render
    needs: [backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy
        run: |
          curl -s "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" || echo "Render deploy triggered"

  deploy-frontend:
    name: Deploy Frontend → Vercel
    needs: [frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./client
          vercel-args: '--prod'

  deploy-ai:
    name: Deploy AI → Railway
    needs: [ai-services]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Railway
        uses: bervProject/railway-deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: ai-services
