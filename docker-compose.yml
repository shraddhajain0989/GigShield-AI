# ============================================================================
# GigShield AI — One-Command Docker Setup
# ============================================================================
#
#   docker compose up --build
#
# That's it. This will:
#   1. Start PostgreSQL 16 + Redis 7
#   2. Auto-run database migrations (all .sql files)
#   3. Seed demo data (6 workers, 6 zones, admin, active policies)
#   4. Train AI models (Premium + Fraud)
#   5. Start all 7 services
#
# Demo credentials:
#   Admin:  9999999999 / admin123
#   Worker: 9876543210 / demo123
#
# URLs:
#   Frontend:    http://localhost
#   Backend API: http://localhost:5000/api/health
#   Premium AI:  http://localhost:8001/docs
#   Fraud AI:    http://localhost:8002/docs
#
# Commands:
#   docker compose up --build       # Start everything
#   docker compose down             # Stop everything
#   docker compose logs -f server   # Tail server logs
#   docker compose down -v          # Stop + delete data
# ============================================================================

services:
  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    container_name: gs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gigshield
      POSTGRES_USER: gigshield
      POSTGRES_PASSWORD: gigshield_dev_2026
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gigshield -d gigshield"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ── Redis ──
  redis:
    image: redis:7-alpine
    container_name: gs-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Premium Prediction AI ──
  premium-ai:
    build: ./ai-services
    container_name: gs-premium-ai
    restart: unless-stopped
    ports:
      - "8001:8001"
    command: ["uvicorn", "premium_service.main:app", "--host", "0.0.0.0", "--port", "8001"]
    environment:
      PYTHONUNBUFFERED: "1"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Fraud Detection AI ──
  fraud-ai:
    build: ./ai-services
    container_name: gs-fraud-ai
    restart: unless-stopped
    ports:
      - "8002:8002"
    command: ["uvicorn", "fraud_service.main:app", "--host", "0.0.0.0", "--port", "8002"]
    environment:
      PYTHONUNBUFFERED: "1"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Backend API Server ──
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: gs-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: "5000"
      DATABASE_URL: postgresql://gigshield:gigshield_dev_2026@postgres:5432/gigshield
      REDIS_URL: redis://redis:6379
      JWT_SECRET: gigshield_jwt_secret_change_in_production
      WEATHER_API_KEY: ${OPENWEATHER_API_KEY}
      AQI_API_KEY: ${WAQI_API_KEY}
      PREMIUM_API_URL: http://premium-ai:8001
      FRAUD_API_URL: http://fraud-ai:8002
      DEMO_SEED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Trigger Engine (Background Worker) ──
  trigger-engine:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: gs-trigger-engine
    restart: unless-stopped
    entrypoint: []
    command: ["node", "src/services/trigger-engine/runner.js"]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://gigshield:gigshield_dev_2026@postgres:5432/gigshield
      REDIS_URL: redis://redis:6379
      WEATHER_API_KEY: ${OPENWEATHER_API_KEY}
      AQI_API_KEY: ${WAQI_API_KEY}
      FRAUD_API_URL: http://fraud-ai:8002
    depends_on:
      server:
        condition: service_healthy

  # ── React Frontend (Nginx) ──
  client:
    build:
      context: ./client
      args:
        VITE_API_URL: /api/v1
    container_name: gs-client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy

volumes:
  pgdata:
